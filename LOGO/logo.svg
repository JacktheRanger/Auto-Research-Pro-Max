<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 20 80 80" fill="none">
  <defs>
    <!-- Chip Casing -->
    <linearGradient id="chip-case" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4B5563" />
      <stop offset="100%" stop-color="#1F2937" />
    </linearGradient>

    <!-- Chip Core -->
    <linearGradient id="chip-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <!-- Project Colors mapped to a premium neon glow -->
    <linearGradient id="g-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2b05e" />
      <stop offset="100%" stop-color="#d9823b" />
    </linearGradient>

    <linearGradient id="g-mint" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e8f7a" />
      <stop offset="100%" stop-color="#5bc0a8" />
    </linearGradient>
  </defs>

  <!-- Outer M-Series Silicon Die / Pro Max Chip Frame -->
  <rect x="22" y="22" width="76" height="76" rx="20" fill="url(#chip-case)" />
  <!-- Glossy bezel line -->
  <rect x="22" y="22" width="76" height="76" rx="20" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" />

  <!-- Solid Core Base -->
  <rect x="34" y="34" width="52" height="52" rx="10" fill="url(#chip-core)" />
  <rect x="34" y="34" width="52" height="52" rx="10" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

  <!-- Core Alignment Markers (Silicon Traces) -->
  <!-- Left Side -->
  <path d="M 34 46 L 38 46 M 34 74 L 38 74" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round" />
  <!-- Right Side -->
  <path d="M 86 46 L 82 46 M 86 74 L 82 74" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round" />
  <!-- Top Side -->
  <path d="M 46 34 L 46 38 M 74 34 L 74 38" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round" />
  <!-- Bottom Side -->
  <path d="M 46 86 L 46 82 M 74 86 L 74 82" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- Additional Center Alignment Traces -->
  <path d="M 28 60 L 32 60 M 92 60 L 88 60 M 60 28 L 60 32 M 60 92 L 60 88" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round" />

  <!-- The Pro Max Intelligence Engine (Apple Siri / Intelligence intersecting double loop) -->
  <path d="M 44 60 C 44 46, 56 46, 60 60 C 64 74, 76 74, 76 60 C 76 46, 64 46, 60 60 C 56 74, 44 74, 44 60 Z" fill="none" stroke="url(#g-mint)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
  
  <path d="M 60 44 C 74 44, 74 56, 60 60 C 46 64, 46 76, 60 76 C 74 76, 74 64, 60 60 C 46 56, 46 44, 60 44 Z" fill="none" stroke="url(#g-orange)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />

  <!-- Focus spark core -->
  <circle cx="60" cy="60" r="3.5" fill="#ffffff" />
</svg>
